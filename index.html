<!DOCTYPE html>
<html lang="es">
<head>

    <title>Portafolio de Matemáticas | Henry Montenegro</title>
    
    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Global (compartido en todas las vistas) -->

<body>
    <main class="hero">
        <!-- Símbolos decorativos de fondo -->
        <div class="math-symbols symbol-1">∑</div>
        <div class="math-symbols symbol-2">∫</div>
        <div class="math-symbols symbol-3">∇</div>
        <div class="math-symbols symbol-4">π</div>

        <div class="hero-container">
            <!-- Badge superior -->
            <div class="hero-badge">Portafolio Académico</div>

            <!-- Título Principal -->
            <h1 class="hero-title"><span>Matemáticas IV</span></h1>

            <!-- Separador -->
            <div class="hero-divider"></div>

            <!-- PERFIL MINIMALISTA HORIZONTAL -->
            <div class="profile-minimal">
                <!-- Avatar Circular con anillo animado -->
                <div class="profile-avatar-circle">
                    <span class="avatar-initials">HM</span>
                    <div class="avatar-status-ring"></div>
                    <div class="avatar-status-dot"></div>
                </div>

                <div class="profile-data">
                    <h2 class="profile-full-name">Henry Montenegro Alvarez</h2>
                    <p class="profile-semester">Cuarto Semestre — PCEI</p>
                    
                    <!-- Etiquetas (Tags) -->
                    <div class="profile-tags">
                        <span class="tag">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="8" cy="5" r="2"/>
                                <path d="M4 13C4 10.79 5.79 9 8 9C10.21 9 12 10.79 12 13"/>
                            </svg>
                            <span>Docente: Luis Zapata</span>
                        </span>
                        
                        <span class="tag">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M8 2V8L12 10"/>
                                <circle cx="8" cy="8" r="6"/>
                            </svg>
                            <span>Periodo: 2026</span>
                        </span>

            </div>
        </div>

        <!-- Botón de Navegación -->
        <div class="hero-cta">
            <a href="./views/portafolio.html" class="btn-cta">

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19"/>
                </svg>
            </a>
            <p class="cta-hint">Explora el contenido académico</p>
        </div>
        <!-- Partículas sutiles -->
        <div class="hero-particles">
            <div class="hero-particle"></div>
            <div class="hero-particle"></div>
            <div class="hero-particle"></div>
            <div class="hero-particle"></div>
            <div class="hero-particle"></div>
        </div>

        <footer class="hero-footer">
            <span>Última actualización: Mayo 2026</span>
        </footer>
